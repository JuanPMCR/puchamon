<<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Pokedex </title>
    </head>
    <body>
        <div>
            <input id="buscarPokemon" type="text">
            <button onclick="searchPokemon()">Buscar</button>
        </div>
        <div id="pokemon">
            <img id="imgPokemon">
            <div>
                <h2>Nombre: </h2>
                <p id="nomPokemon"></p>
            </div>
            <div>
                <h2>Tipo: </h2>
                <p id="typePokemon"></p>
            </div>
            <div>
                <h2>Peso: </h2>
                <p id="weightPokemon"></p>
            </div>
            <div>
                <h2>Altura: </h2>
                <p id="heightPokemon"></p>
            </div>
            <div>
                <h2>ID: </h2>
                <p id="idPokemon"></p>
            </div>
            <div>
                <h2>Stats base</h2>
                <p id="statsPokemon"></p>
            </div>
            <div>
                <h2>Habilidades: </h2>
                <p id="abilitiesPokemon"></p>
            </div>
            <div>
                <h2>Movimientos: </h2>
                <p id="movesPokemon"></p>
            </div>
            
        </div>
    </body>
    <script src="script.js"></script>
</html>
