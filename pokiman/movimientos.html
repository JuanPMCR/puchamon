<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Puchamon - Movimientos</title>
    </head>
    <body>
        <div>
            <input id="buscarMovimiento" type="text">
            <button onclick="searchMoves()">Busca Movimientos</button>
        </div>
        <div id="moves">
            <div>
                <h2>Nombre: </h2>
                <p id="nomMove"></p>
            </div>
            <div>
                <h2>Tipo: </h2>
                <p id="typeMove"></p>
            </div>
            <div>
                <h2>Poder: </h2>
                <p id="powerMove"></p>
            </div>
            <div>
                <h2>PP: </h2>
                <p id="ppMove"></p>
            </div>
            <div>
                <h2>Precision: </h2>
                <p id="accuracyMove"></p>
            </div>
            <div>
                <h2>Prioridad: </h2>
                <p id="priorityMove"></p>
            </div>
        </div>
    </body>
    <script src="movimientos.js"></script>
</html>
