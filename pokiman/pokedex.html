<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Pokedex - lista</title>
    </head>
    <body>

            <a href="pokedex.html" class="active">Pokedex</a>

                <ul id="listPokemon"></ul>
